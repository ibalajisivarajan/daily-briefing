<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TPM Daily Briefing</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100vh; height: 100dvh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

.bg {
  background-size: cover;
  background-position: center;
  background-color: #1a1a2e;
  width: 100%;
  height: 100vh;
  height: 100dvh;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.5) 100%);
}

.content {
  position: relative;
  z-index: 10;
  height: 100vh;
  height: 100dvh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 40px 60px;
  color: white;
}

/* ── Top bar ── */
.topbar { display: flex; justify-content: space-between; align-items: flex-start; }
.date { font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.8; padding-top: 4px; }
.weather-group { display: flex; gap: 40px; }
.weather-item { text-align: right; }
.weather-city { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
.weather-temp { font-size: 22px; font-weight: 300; }
.weather-condition { font-size: 12px; opacity: 0.6; margin-top: 2px; }

/* ── Hero ── */
.hero { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
.time { font-size: 140px; font-weight: 100; letter-spacing: -4px; line-height: 1; margin-bottom: 20px; }
.greeting { font-size: 36px; font-weight: 300; margin-bottom: 24px; opacity: 0.95; }
.quote { font-size: 17px; font-style: italic; opacity: 0.8; max-width: 600px; line-height: 1.6; }

/* ── Tabs ── */
.tabs { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
.tab {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255,255,255,0.25);
  padding: 14px 28px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 13px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.3s ease;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
}
.tab:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }
.tab-count { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }

/* ── Refresh button ── */
.refresh-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 0.5px solid rgba(255,255,255,0.25);
  padding: 12px 24px;
  border-radius: 50px;
  color: white;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: inherit;
}
.refresh-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }
.refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
@keyframes spin { to { transform: rotate(360deg); } }
.spin { display: inline-block; animation: spin 1s linear infinite; }

/* ── Modal ── */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; }
.modal.active { display: flex; justify-content: center; align-items: center; animation: fadeIn 0.3s ease; }
.modal-content {
  background: rgba(20,20,30,0.9);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 0.5px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 48px;
  max-width: 700px;
  width: 90%;
  max-height: 80dvh;
  overflow-y: auto;
  color: white;
  animation: slideUp 0.4s ease;
  position: relative;
}
.modal-close {
  position: absolute; top: 20px; right: 20px;
  background: rgba(255,255,255,0.1); border: none; color: white;
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
  font-size: 16px; transition: background 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: rgba(255,255,255,0.25); }
.modal-title { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin-bottom: 32px; }
.modal-item { padding: 20px 0; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
.modal-item:last-child { border: none; padding-bottom: 0; }
.modal-item a { display: block; font-size: 16px; line-height: 1.5; margin-bottom: 8px; color: white; text-decoration: none; }
.modal-item a:hover { opacity: 0.8; }
.modal-item-source { font-size: 12px; opacity: 0.5; }

/* ── Loading state ── */
.loading-pulse { animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ── Mobile ── */
@media (max-width: 768px) {
  .content         { padding: 20px 16px 16px; }
  .date            { font-size: 11px; letter-spacing: 1px; white-space: nowrap; }
  .weather-group   { gap: 16px; }
  .weather-city    { font-size: 11px; }
  .weather-temp    { font-size: 15px; }
  .weather-condition { font-size: 10px; }
  .time            { font-size: 72px; letter-spacing: -2px; margin-bottom: 12px; }
  .greeting        { font-size: 24px; margin-bottom: 12px; }
  .quote           { font-size: 15px; }
  .tabs            { gap: 8px; }
  .tab             { padding: 10px 16px; font-size: 11px; gap: 6px; }
  .tab-count       { padding: 1px 6px; font-size: 10px; }
  .refresh-btn     { padding: 10px 18px; font-size: 12px; bottom: 16px; right: 16px; }
  .modal-content   { padding: 32px 24px; }
}
</style>
</head>
<body>

<div class="bg" id="bg">
  <div class="overlay"></div>

  <div class="content">
    <div class="topbar">
      <div class="date loading-pulse" id="date">Loading…</div>
      <div class="weather-group">
        <div class="weather-item">
          <div class="weather-city" id="langley-city">Langley, BC</div>
          <div class="weather-temp loading-pulse" id="langley-temp">—</div>
          <div class="weather-condition" id="langley-condition"></div>
        </div>
        <div class="weather-item">
          <div class="weather-city" id="ferndale-city">Ferndale, WA</div>
          <div class="weather-temp loading-pulse" id="ferndale-temp">—</div>
          <div class="weather-condition" id="ferndale-condition"></div>
        </div>
      </div>
    </div>

    <div class="hero">
      <div class="time loading-pulse" id="time">--:--</div>
      <div class="greeting loading-pulse" id="greeting">Good morning, Bala.</div>
      <div class="quote" id="quote"></div>
    </div>

    <div class="tabs">
      <div class="tab" onclick="openModal('geopolitics')">🌍 Geopolitics <span class="tab-count" id="count-geopolitics">—</span></div>
      <div class="tab" onclick="openModal('technology')">⚙️ Tech <span class="tab-count" id="count-technology">—</span></div>
      <div class="tab" onclick="openModal('finance')">💰 Finance <span class="tab-count" id="count-finance">—</span></div>
      <div class="tab" onclick="openModal('local')">📍 Local <span class="tab-count" id="count-local">—</span></div>
      <div class="tab" onclick="openModal('jobs')">💼 Jobs <span class="tab-count" id="count-jobs">—</span></div>
    </div>
  </div>

  <button class="refresh-btn" id="refreshBtn" onclick="refreshBriefing()">🔄 Refresh</button>

  <div class="modal" id="modal-geopolitics">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">🌍 Geopolitics</div>
      <div id="items-geopolitics"></div>
    </div>
  </div>
  <div class="modal" id="modal-technology">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">⚙️ Technology</div>
      <div id="items-technology"></div>
    </div>
  </div>
  <div class="modal" id="modal-finance">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">💰 Finance</div>
      <div id="items-finance"></div>
    </div>
  </div>
  <div class="modal" id="modal-local">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">📍 Local</div>
      <div id="items-local"></div>
    </div>
  </div>
  <div class="modal" id="modal-jobs">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">💼 Jobs</div>
      <div id="items-jobs"></div>
    </div>
  </div>
</div>

<script>
var GITHUB_TOKEN = '';
var GITHUB_REPO  = 'ibalajisivarajan/daily-briefing';
var CATEGORIES   = ['geopolitics', 'technology', 'finance', 'local', 'jobs'];

function setText(id, val) {
  var el = document.getElementById(id);
  if (el) { el.textContent = val; el.classList.remove('loading-pulse'); }
}

function renderNews(cat, items) {
  var container = document.getElementById('items-' + cat);
  if (!container) return;
  if (!items || items.length === 0) {
    container.innerHTML = '<div class="modal-item" style="opacity:0.5">No headlines available</div>';
    return;
  }
  container.innerHTML = items.map(function(item) {
    return '<div class="modal-item">' +
      '<a href="' + escHtml(item.url) + '" target="_blank" rel="noopener">' + escHtml(item.title) + '</a>' +
      '<div class="modal-item-source">' + escHtml(item.source) + ' · ' + escHtml(item.date) + '</div>' +
      '</div>';
  }).join('');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadData() {
  try {
    var resp = await fetch('/data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var d = await resp.json();

    if (d.background_image_url) {
      document.getElementById('bg').style.backgroundImage = "url('" + d.background_image_url + "')";
    }

    setText('date',     d.date);
    setText('time',     d.time);
    setText('greeting', d.greeting);
    setText('quote',    '“' + d.quote + '”');

    var lw = d.weather && d.weather.langley;
    var fw = d.weather && d.weather.ferndale;
    if (lw) {
      setText('langley-city',      lw.city || 'Langley, BC');
      setText('langley-temp',      lw.icon + ' ' + lw.temp + '°');
      setText('langley-condition', lw.condition);
    }
    if (fw) {
      setText('ferndale-city',      fw.city || 'Ferndale, WA');
      setText('ferndale-temp',      fw.icon + ' ' + fw.temp + '°');
      setText('ferndale-condition', fw.condition);
    }

    if (d.news) {
      CATEGORIES.forEach(function(cat) {
        var items = d.news[cat] || [];
        setText('count-' + cat, items.length);
        renderNews(cat, items);
      });
    }

    if (d.github_token) GITHUB_TOKEN = d.github_token;

  } catch (err) {
    console.error('Failed to load data.json:', err);
    setText('time', '--:--');
    setText('greeting', 'Could not load briefing data.');
  }
}

function openModal(cat) {
  document.querySelectorAll('.modal').forEach(function(m) { m.classList.remove('active'); });
  document.getElementById('modal-' + cat).classList.add('active');
}
function closeModal() {
  document.querySelectorAll('.modal').forEach(function(m) { m.classList.remove('active'); });
}
document.querySelectorAll('.modal').forEach(function(modal) {
  modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });
});
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

async function refreshBriefing() {
  var btn = document.getElementById('refreshBtn');
  if (!GITHUB_TOKEN) {
    btn.textContent = '✗ No token';
    setTimeout(function() { btn.textContent = '🔄 Refresh'; }, 2000);
    return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">🔄</span> Refreshing…';
  try {
    var res = await fetch(
      'https://api.github.com/repos/' + GITHUB_REPO + '/actions/workflows/generate.yml/dispatches',
      {
        method: 'POST',
        headers: {
          'Accept': 'application/vnd.github+json',
          'Authorization': 'token ' + GITHUB_TOKEN,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ ref: 'main' })
      }
    );
    if (res.ok || res.status === 204) {
      btn.innerHTML = '✓ Triggered!';
      setTimeout(function() { btn.innerHTML = '⏳ Deploying (~30s)'; }, 2000);
      setTimeout(function() { loadData(); btn.disabled = false; btn.innerHTML = '🔄 Refresh'; }, 35000);
    } else {
      btn.innerHTML = '✗ Failed (' + res.status + ')';
      setTimeout(function() { btn.disabled = false; btn.innerHTML = '🔄 Refresh'; }, 3000);
    }
  } catch (err) {
    btn.innerHTML = '✗ Error';
    setTimeout(function() { btn.disabled = false; btn.innerHTML = '🔄 Refresh'; }, 3000);
  }
}

loadData();
</script>
</body>
</html>
