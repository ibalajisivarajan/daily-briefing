name: Generate Daily Briefing

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing data
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.BRIEFING_REFRESH_TOKEN }}
        run: python src/generate_briefing.py

      - name: Commit and push data.json
        run: |
          git config user.name "Daily Briefing Bot"
          git config user.email "bot@github.local"
          git add docs/data.json
          git commit -m "chore: refresh briefing data" --allow-empty
          git push
